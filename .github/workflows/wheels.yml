name: Build Python wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: >-
          Actually publish the manifest/wheels/sdist to the GitHub release and
          (when GITEE_ACCESS_TOKEN is configured) Gitee. Default false keeps
          manual dispatch a safe dry-run/shape-check; the automatic
          release.published trigger always publishes.
        type: boolean
        default: false
      release_tag:
        description: >-
          Optional existing v* tag to check out for an exact-tag manual
          recovery. Empty keeps the selected workflow ref.
        type: string
        default: ""
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Fail loud instead of hanging: cibuildwheel across three CPythons plus a
    # QEMU-emulated aarch64 leg is the long pole, so give it a generous but
    # bounded ceiling rather than the 6h GitHub default.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Four-platform coverage. macos-15-intel is the current GitHub-hosted
        # Intel label (macos-13 was retired); macos-14 is Apple Silicon (arm64).
        # cibuildwheel builds arch-specific macOS wheels (CIBW_ARCHS_MACOS=auto),
        # so each runner yields its own native slice — no universal2.
        os: [ubuntu-latest, macos-15-intel, macos-14, windows-latest]
        include:
          # macOS deployment target must match the Rust sidecar's minimum OS, or
          # delocate rejects the wheel ("Library dependencies do not satisfy
          # target MacOS version"). rustc defaults to 10.12 on x86_64 and 11.0 on
          # arm64, while CPython historically tags macOS wheels 10.9 — the
          # mismatch is what broke the Intel leg. Pin the target per arch so the
          # wheel *tag* and the *sidecar compile* agree; the value is exported
          # into the build env below (CIBW_ENVIRONMENT_MACOS), which both raises
          # the wheel's platform tag and reaches cargo via setup.py.
          - os: macos-15-intel
            macos_target: "10.12"
          - os: macos-14
            macos_target: "11.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          persist-credentials: false

      - name: Validate manual recovery tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_REQUESTED" == "true" && -z "$RELEASE_TAG" ]]; then
            echo "::error::Manual publishing requires an explicit existing vX.Y.Z release_tag."
            exit 1
          fi
          if [[ -z "$RELEASE_TAG" ]]; then
            exit 0
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release_tag must be a simple semantic-version tag such as v0.17.1."
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "::error::Checked-out HEAD does not match refs/tags/${RELEASE_TAG}."
            exit 1
          fi

      - name: Set up QEMU for Linux aarch64 wheels
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Fail CI loudly if the native sidecar cannot be built. Local/source
          # installs still keep setup.py's soft fallback unless this env var is
          # explicitly set.
          LINGTAI_REQUIRE_RUST_BUILD: "1"
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* pp*"
          # The sidecar is a native executable, so build arch-specific macOS
          # wheels on the Intel and Apple Silicon runners instead of universal2.
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_LINUX: "auto64 aarch64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Consistent macOS floor for both the wheel platform tag and the cargo
          # build of lingtai-search-sidecar (see matrix.include). Empty on
          # non-macOS runners, where this *_MACOS override is ignored.
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target }}
            LINGTAI_REQUIRE_RUST_BUILD=1
          CIBW_BEFORE_BUILD_LINUX: >-
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          CIBW_ENVIRONMENT_LINUX: >-
            PATH="$HOME/.cargo/bin:$PATH"
            LINGTAI_REQUIRE_RUST_BUILD=1
          # NOTE: no CIBW_TEST_* here on purpose. cibuildwheel's built-in test
          # phase always `pip install`s the wheel WITH its full runtime
          # dependency tree (not configurable), which drags in faster-whisper →
          # av (PyAV). In the manylinux2014 test container PyAV has only an sdist
          # that needs FFmpeg pkg-config dev libs, so the smoke test failed
          # during unrelated dependency installation even though the repaired
          # wheel was valid. The sidecar is verified instead by the dependency-
          # free `Verify built wheels` step below (pip install --no-deps).

      # Pin a known interpreter so the verify step's `cp3XX` tag deterministically
      # matches one of the built wheels (cp311/cp312/cp313) on every runner,
      # rather than depending on the image's ambient `python`.
      - name: Set up Python for wheel verification
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify built wheels carry a runnable sidecar
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(./wheelhouse/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "no wheels produced in ./wheelhouse" >&2
            exit 1
          fi
          # `--auto` per wheel: the checker installs (--no-deps) and executes the
          # sidecar when the wheel is compatible with this interpreter, else does
          # the archive-layout check only (the QEMU aarch64 Linux wheel can't run
          # on the x86_64 runner). Every wheel is checked; a real defect fails
          # loud. See tests/test_wheel_sidecar_smoke.py for why this is
          # dependency-free (the manylinux2014 PyAV/FFmpeg trap).
          for w in "${wheels[@]}"; do
            python tests/test_wheel_sidecar_smoke.py --auto "$w"
          done
          # Fail loud if NO produced wheel was compatible enough to run
          # end-to-end here — a proof that is only ever archive-deep would be a
          # weaker gate than intended.
          python - "${wheels[@]}" <<'PY'
          import sys
          from tests.test_wheel_sidecar_smoke import wheel_runnable_here
          from pathlib import Path
          if not any(wheel_runnable_here(Path(w)) for w in sys.argv[1:]):
              sys.exit("no produced wheel was runnable on this runner; "
                       "install+run proof did not execute")
          PY

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    # Independent of build-wheels so a wheel/auditwheel failure on any platform
    # cannot suppress the source release. The sdist is source-only (setup.py's
    # cargo hook fires only for bdist_wheel/build_py), so it needs no Rust.
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          persist-credentials: false

      - name: Validate manual recovery tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_REQUESTED" == "true" && -z "$RELEASE_TAG" ]]; then
            echo "::error::Manual publishing requires an explicit existing vX.Y.Z release_tag."
            exit 1
          fi
          if [[ -z "$RELEASE_TAG" ]]; then
            exit 0
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release_tag must be a simple semantic-version tag such as v0.17.1."
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "::error::Checked-out HEAD does not match refs/tags/${RELEASE_TAG}."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build source distribution
        run: uv build --sdist --out-dir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  release-manifest:
    name: Generate release manifest
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Serial by design: this job only aggregates the wheelhouse+sdist artifacts
    # the matrix already built and verified (see "Verify built wheels carry a
    # runnable sidecar" above); it must never rebuild anything per platform.
    # `needs: [build-wheels, build-sdist]` makes it wait for every matrix leg,
    # so a partial/failed platform build fails this job loud via `needs`
    # rather than silently shipping an incomplete manifest.
    timeout-minutes: 15
    permissions:
      # write is required only for the actual publish path (gh release
      # upload / create); the dry-run path never mutates anything regardless
      # of this permission grant.
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag && format('refs/tags/{0}', inputs.release_tag) || github.ref }}
          persist-credentials: false
          # sync_gitee_mirror.py needs the full history reachable from
          # the checked-out commit to `git cat-file -e`/push it; a shallow
          # checkout (the actions/checkout@v4 default) would make that fail.
          fetch-depth: 0

      - name: Validate manual recovery tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          PUBLISH_REQUESTED: ${{ inputs.publish }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_REQUESTED" == "true" && -z "$RELEASE_TAG" ]]; then
            echo "::error::Manual publishing requires an explicit existing vX.Y.Z release_tag."
            exit 1
          fi
          if [[ -z "$RELEASE_TAG" ]]; then
            exit 0
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release_tag must be a simple semantic-version tag such as v0.17.1."
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$head_commit" ]]; then
            echo "::error::Checked-out HEAD does not match refs/tags/${RELEASE_TAG}."
            exit 1
          fi

      - name: Set up Python for the manifest/publish scripts
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install manifest runtime dependencies
        run: python -m pip install "packaging>=24.0"

      - name: Download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "wheels-*"
          path: release-assets
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: release-assets

      - name: Generate release manifest + SHA256SUMS
        env:
          # release.published fires with a real tag; workflow_dispatch has no
          # tag unless release_tag explicitly selects an existing tag for
          # exact-source recovery. Otherwise fall back to the pyproject version
          # and checked-out workflow ref for dry-run manifest-shape testing.
          KERNEL_TAG: ${{ github.event.release.tag_name || inputs.release_tag || '' }}
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${KERNEL_TAG:-v${version}}"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/generate_release_manifest.py \
            --assets-dir release-assets \
            --kernel-version "$version" \
            --kernel-tag "$tag" \
            --commit "$(git rev-parse HEAD)" \
            --generated-at "$generated_at" \
            --out-manifest release-assets/lingtai-kernel-release-manifest.json \
            --out-sha256sums release-assets/SHA256SUMS

      - name: Determine publish mode
        id: publish_mode
        run: |
          set -euo pipefail
          # Publish for real only on the automatic release.published trigger,
          # or on an explicit workflow_dispatch with publish=true. Every other
          # run (default workflow_dispatch, or any run without the input)
          # stays dry-run — this is the fix for the prior version of this job,
          # which unconditionally omitted --execute and so could never
          # publish anything even on a real release.
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "execute=1" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.publish }}" == "true" ]]; then
            if [[ -z "${{ inputs.release_tag }}" ]]; then
              echo "::error::Manual publishing requires release_tag."
              exit 1
            fi
            echo "execute=1" >> "$GITHUB_OUTPUT"
          else
            echo "execute=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Non-force synchronize the exact commit/tag to Gitee
        if: steps.publish_mode.outputs.execute == '1'
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${{ github.event.release.tag_name || inputs.release_tag || '' }}"
          tag="${tag:-v${version}}"
          # Skips cleanly (exit 0, prints why) when GITEE_ACCESS_TOKEN is
          # unset — see sync_gitee_mirror.py. Every push is non-force; a
          # divergence/existing-tag conflict fails this step loud rather than
          # silently overwriting the mirror.
          python scripts/sync_gitee_mirror.py \
            --commit "$(git rev-parse HEAD)" \
            --tag "$tag" \
            --branch main \
            --execute

      - name: Publish manifest/wheels/sdist
        env:
          GH_TOKEN: ${{ github.token }}
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          version="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${{ github.event.release.tag_name || inputs.release_tag || '' }}"
          tag="${tag:-v${version}}"
          execute_flag=""
          if [[ "${{ steps.publish_mode.outputs.execute }}" == "1" ]]; then
            execute_flag="--execute"
            echo "Publishing $tag for real (event=${{ github.event_name }})."
          else
            echo "Manifest ready for $tag. Dry run only (event=${{ github.event_name }}, publish input=${{ inputs.publish }})."
          fi
          # publish_release_assets.py is idempotent (skips already-attached
          # same-name assets) and never force-syncs/deletes — safe to run
          # repeatedly. Gitee leg is skipped internally when
          # GITEE_ACCESS_TOKEN is unset, regardless of execute_flag.
          python scripts/publish_release_assets.py \
            --manifest release-assets/lingtai-kernel-release-manifest.json \
            --assets-dir release-assets \
            $execute_flag

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            release-assets/lingtai-kernel-release-manifest.json
            release-assets/SHA256SUMS
          if-no-files-found: error
