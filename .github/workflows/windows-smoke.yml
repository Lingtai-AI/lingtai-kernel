# Windows-native smoke — NOT a release/wheel workflow.
#
# Runs the bash capability's native-Windows coverage on a real `windows-latest`
# runner: the `powershell.exe` shell strategy exercised end to end
# (tests/test_windows_native_bash_smoke.py, win32-only) plus the simulated
# Windows guards (tests/test_bash_windows.py, run everywhere). We have no local
# Windows runner, so this workflow is where the real Windows path is verified.
#
# Wheel building on windows-latest lives separately in wheels.yml; keep the two
# distinct — this one installs editable metadata without dependencies and never builds or publishes anything.
name: Windows native smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - src/lingtai/core/bash/**
      - src/lingtai/core/daemon/runtime.py
      - pyproject.toml
      - setup.py
      - tests/test_windows_native_bash_smoke.py
      - tests/test_bash_windows.py
      - .github/workflows/windows-smoke.yml

permissions:
  contents: read

jobs:
  smoke:
    name: Bash native smoke on windows-latest
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        # The package __init__ reads installed metadata, so a bare PYTHONPATH=src
        # import is not enough in a fresh runner. Install editable metadata with
        # --no-deps to avoid the full runtime/Rust sidecar dependency surface;
        # pytest + PyYAML cover the imports hit by these bash/daemon smoke tests.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml
          python -m pip install -e . --no-deps

      - name: Run Windows bash smoke tests
        # Native smoke (win32-only) plus the simulated Windows guards.
        run: python -m pytest tests/test_windows_native_bash_smoke.py tests/test_bash_windows.py -q
