name: Kernel Windows PR contract

on:
  pull_request:
    paths:
      - ".github/workflows/kernel-windows-pr.yml"
      - "src/lingtai/adapters/**"
      - "src/lingtai/kernel/**"
      - "src/lingtai/tools/daemon/**"
      - "src/lingtai/tools/avatar/**"
      - "src/lingtai/cli.py"
      - "src/lingtai/agent.py"
      - "tests/test_workdir_lease*.py"
      - "tests/test_refresh_watcher_windows.py"
      - "tests/test_process_scan.py"
      - "tests/test_process_match.py"
      - "tests/test_daemon_windows_*.py"
      - "tests/test_avatar_launcher_windows.py"
      - "tests/test_portable_adapter_encoding.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-windows-kernel:
    name: Native Windows / kernel lifecycle
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install kernel with dependencies
        shell: pwsh
        env:
          LINGTAI_SKIP_RUST_BUILD: "1"
        run: |
          python -m pip install --disable-pip-version-check pytest
          python -m pip install --disable-pip-version-check -e .

      - name: Run Windows kernel contract tiers
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pytest -q `
            tests/test_windows_import_graph.py `
            tests/test_workdir_lease.py `
            tests/test_workdir_lease_posix_only.py `
            tests/test_refresh_watcher_windows.py `
            tests/test_process_scan.py `
            tests/test_process_match.py `
            tests/test_portable_adapter_encoding.py `
            tests/test_agent_presence.py `
            tests/test_notification_store.py `
            tests/test_mail_transport.py `
            tests/test_kernel_migrate.py `
            tests/test_git_init.py `
            tests/test_daemon_windows_lock.py `
            tests/test_daemon_windows_process_port.py `
            tests/test_daemon_windows_supervisor.py `
            tests/test_avatar_launcher_windows.py

      - name: Run native lifecycle smoke
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pytest -q `
            tests/test_agent.py `
            tests/test_lifecycle_daemon_shutdown.py
