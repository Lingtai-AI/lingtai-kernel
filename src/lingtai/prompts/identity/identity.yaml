kind: prompt-section-definition
section: identity
name_definition: >
  "identity" is the generated mechanical-runtime-facts section. It is named for the
  runtime identity facts it renders: name, address, birth, privileges, model/provider,
  and message surfaces. It is the mechanical identity injected by the runtime, NOT the
  self-authored LingTai/character.
purpose: >
  Exists so the agent always knows its mechanical runtime facts (who/where/what model/
  what surfaces), generated by the runtime, kept distinct from the self-authored
  character and from current work.
scope:
  owns:
    - Mechanical runtime facts: name, address, birth, privileges, model/provider, message surfaces.
  does_not_own:
    - The self-authored LingTai/character identity (owned by character).
    - Current working state (owned by pad).
    - The operator/recipe constitution (owned by covenant).
injection_contract:
  defined_by: kernel
  injected_by: runtime
  content_source: runtime_identity_facts
  override_policy: not_user_overridable
  notes: >
    Generated mechanical facts injected by the runtime; no static identity.md body and
    no self-authored content. Distinct from character (self-authored) and covenant
    (operator contract).
related_files:
  - path: src/lingtai/prompts/ANATOMY.md
    why: >
      The owning prompt-source anatomy: it records identity as generated mechanical
      facts. Read it before confusing identity with the self-authored character.
  - path: src/lingtai/kernel/base_agent/identity.py
    why: >
      Owns the concrete identity-section build rule: _update_identity() builds the
      manifest and _build_identity_section() renders the mechanical facts (deliberately
      excluding runtime-transient fields for cache stability), then writes the section.
      Crawl here for exactly which facts are surfaced and which are withheld.
  - path: src/lingtai/prompts/character/character.yaml
    why: >
      identity is mechanical facts and character is self-authored identity; edit
      together so runtime facts and self-authored self do not blur.
  - path: src/lingtai/prompts/pad/pad.yaml
    why: >
      identity is durable mechanical facts and pad is current work; edit together so
      identity facts and task state stay separate.
  - path: src/lingtai/prompts/covenant/covenant.yaml
    why: >
      identity is mechanical self and covenant is the operator contract; keep them
      together so runtime identity is not mistaken for constitutional authority.
maintenance:
  - related_files is a progressive-disclosure crawl graph, not a dependency dump: peer section YAMLs for boundary/overlap risk plus the canonical builder/navigation files that own the concrete construction rules (here base_agent/identity.py). Each link explains what rule or boundary its target owns; do not list tests merely because they validate behavior.
  - identity is generated; do not add an identity.md body. The body relation lives in injection_contract.content_source, so do not point related_files at a concrete prompt `.md` body. `.md` links are reserved for the owning ANATOMY and canonical manual/reference docs that own deeper rules, never a prompt body or a test.
  - Keep the identity (mechanical facts) vs character (self-authored) vs pad (current work) boundary explicit.
